---
name: Promote to environment on Scaleway Serverless Container

#
# Calculate previous environment, re-tag the image and redeploy the serverless container.
#

on:
  workflow_call:
    # Depends on the following vars
    # - CONTAINER_REGISTRY_ENDPOINT
    # - RUNNER_DEFAULT
    # - RUNNER_INFRA
    # - SCALEWAY_ORGANIZATION_ID
    # - SCALEWAY_PROJECT_ID
    # - SCALEWAY_REGION
    # - SCALEWAY_SERVERLESS_CONTAINER_ID
    inputs:
      environment-source:
        description: Source environment to deploy FROM (defaults to previous environment)
        type: string
        required: false
      environment-target:
        description: Target environment to deploy TO
        type: string
        required: true
      environment-map:
        description: Environment map (JSON, fallback to default map)
        type: string
        required: false
      image:
        description: Image name (fallback to repository name)
        type: string
        required: false
    secrets:
      SCALEWAY_ACCESS_KEY:
        description: Scaleway API key ID
        required: true
      SCALEWAY_SECRET_KEY:
        description: Scaleway API key secret
        required: true

jobs:
  promote-tag:
    name: Promote to ${{ inputs.environment-target }}
    runs-on: ${{ vars.RUNNER_INFRA || 'ubuntu-latest' }}
    environment: ${{ inputs.environment-target }}
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail

          function validate-required-input {
            if [ -z "$2" ]; then
              echo "Missing input: $1"
              exit 1
            fi
          }

          validate-required-input SCALEWAY_ORGANIZATION_ID '${{ vars.SCALEWAY_ORGANIZATION_ID }}'
          validate-required-input SCALEWAY_PROJECT_ID '${{ vars.SCALEWAY_PROJECT_ID }}'
          validate-required-input SCALEWAY_REGION '${{ vars.SCALEWAY_REGION }}'
          validate-required-input SCALEWAY_SERVERLESS_CONTAINER_ID '${{ vars.SCALEWAY_SERVERLESS_CONTAINER_ID }}'

      - name: Calculate source and target tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          target="$(echo '${{ inputs.environment-target }}' | tr '[:upper:]' '[:lower:]')"
          echo "target=$target" >> "$GITHUB_OUTPUT"

          if [ -n "${{ inputs.environment-source }}" ]; then
            source="${{ inputs.environment-source }}"
          else
            env_map='${{ inputs.environment-map || env.default-tag-map }}'
            source="$(echo "$env_map" | jq -r --arg target "$target" '.[$target]')"

            if [ "$source" = "null" ] || [ -z "$source" ]; then
              echo "Unable to calculate source for ${{ inputs.environment-target }}." >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
          fi

          echo "source=$source" >> "$GITHUB_OUTPUT"
        env:
          default-tag-map: >  # Note that this is a JSON string
            {
              "development": "development",
              "test": "development",
              "staging": "test",
              "production": "staging"
            }

      - name: Setup Docker environment
        id: setup
        uses: wisemen-digital/devops-github-actions/.github/actions/docker/setup@v1
        with:
          vendor: scaleway
          container-registry: ${{ vars.CONTAINER_REGISTRY_ENDPOINT }}
          image: ${{ inputs.image }}
          login-ghcr: false
          scaleway-secret-key: ${{ secrets.SCALEWAY_SECRET_KEY }}

      - name: Re-tag image
        shell: bash
        run: docker buildx imagetools create "${image_ref}:${source_tag}" --tag "${image_ref}:${target_tag}"
        env:
          image_ref: ${{ steps.setup.outputs.registry }}/${{ steps.setup.outputs.image }}
          source_tag: ${{ steps.tags.outputs.source }}
          target_tag: ${{ steps.tags.outputs.target }}

      - name: Redeploy Scaleway Serverless Container
        uses: wisemen-digital/devops-github-actions/.github/actions/infra/serverless-container/redeploy@v1
        with:
          container-id: ${{ vars.SCALEWAY_SERVERLESS_CONTAINER_ID }}
          scaleway-access-key: ${{ secrets.SCALEWAY_ACCESS_KEY }}
          scaleway-organization-id: ${{ vars.SCALEWAY_ORGANIZATION_ID }}
          scaleway-project-id: ${{ vars.SCALEWAY_PROJECT_ID }}
          scaleway-region: ${{ vars.SCALEWAY_REGION }}
          scaleway-secret-key: ${{ secrets.SCALEWAY_SECRET_KEY }}

      - name: Deployment summary
        shell: bash
        run: |
          {
            echo "## Scaleway Serverless Container promotion"
            echo ""
            echo "- Image: \`${{ steps.setup.outputs.registry }}/${{ steps.setup.outputs.image }}:${{ steps.tags.outputs.source }} -> ${{ steps.setup.outputs.registry }}/${{ steps.setup.outputs.image }}:${{ steps.tags.outputs.target }}\`"
            echo "- Region: \`${{ vars.SCALEWAY_REGION }}\`"
            echo "- Container ID: \`${{ vars.SCALEWAY_SERVERLESS_CONTAINER_ID }}\`"
            echo "- Organization ID: \`${{ vars.SCALEWAY_ORGANIZATION_ID }}\`"
            echo "- Project ID: \`${{ vars.SCALEWAY_PROJECT_ID }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
