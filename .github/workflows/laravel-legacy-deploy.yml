---
name: Deploy Laravel (Legacy)

#
# Deploy the result of a given "build" run to a server.
#

on:
  workflow_call:
    # Depends on the following vars
    # - DEPLOY_URL
    inputs:
      environment:
        description: Target environment
        required: true
        type: string
      extra-rsync-args:
        description: Extra rsync args inserted before the workflow defaults. Use this for custom include/exclude rules when needed.
        required: false
        type: string
      php-version:
        description: PHP Version (such as 8.2)
        default: '8.3'
        required: true
        type: string
    secrets:
      SSH_KEY:
        description: Private SSH key
        required: true

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    container: lorisleiva/laravel-docker:${{ inputs.php-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Prepare .env (needed for some old projects)
        run: cp -f .env.example .env
      # Dependencies
      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      - name: Install dependencies
        run: composer install --prefer-dist --no-ansi --no-interaction --no-progress --no-scripts
      # Optimize
      - name: Optimize composer autoloader
        run: composer dump-autoload --optimize --classmap-authoritative
      - name: Cache laravel events
        run: php artisan event:cache
      - name: Cache laravel routes
        run: php artisan route:cache
      - name: Cache laravel views
        run: php artisan view:cache
      # Archive
      - name: Archive result
        run: tar -czf dist.tar.gz --exclude=.git* * .??*
      - name: Store archive
        uses: actions/upload-artifact@v7
        with:
          name: app-build
          path: dist.tar.gz
          retention-days: 1
  deploy:
    name: Deploy build to ${{ inputs.environment }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Setup SSH
        run: |
          DEPLOY_URL="${{ vars.DEPLOY_URL }}"
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H "${DEPLOY_URL#*@}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/*
      # Get archive
      - name: Download archive
        uses: actions/download-artifact@v8
        with:
          name: app-build
      - name: Extract archive
        run: tar xzf dist.tar.gz && rm dist.tar.gz
      # Pre-deploy: turn server off
      - name: Enable maintenance mode
        run: ssh ${{ vars.DEPLOY_URL }} "php www/htdocs/artisan down"
      # Deploy
      - name: Upload files
        run: |
          rsync -crltDz . ${{ vars.DEPLOY_URL }}:www/htdocs --delete-delay \
            ${{ inputs.extra-rsync-args }} \
            --include=public/index.php \
            --exclude=.env \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=tests \
            --exclude='public/*' \
            --exclude=storage/logs \
            --exclude=storage/framework/sessions \
            --exclude=storage/framework/cache \
            --exclude='storage/oauth-*.key'
      - name: Tweak folders
        run: |
          ssh ${{ vars.DEPLOY_URL }} << EOF
            cd www/htdocs
            mkdir -p storage/framework/sessions

            find bootstrap/cache -type d -exec chmod 775 {} \;
            find bootstrap/cache -type f -exec chmod 664 {} \;
            find storage -type d -exec chmod 775 {} \;
            find storage -type f ! -path 'storage/oauth-*key' -exec chmod 664 {} \;
            chmod 600 storage/oauth-*.key

            php artisan storage:link
          EOF
      - name: Migrate database
        run: ssh ${{ vars.DEPLOY_URL }} "php www/htdocs/artisan migrate --force"
      - name: Clear permissions cache
        continue-on-error: true
        run: ssh ${{ vars.DEPLOY_URL }} "php www/htdocs/artisan permission:cache-reset"
      - name: Restart queues
        run: ssh ${{ vars.DEPLOY_URL }} "php www/htdocs/artisan queue:restart"
      # Post-deploy: turn server back on
      - name: Disable maintenance mode
        run: ssh ${{ vars.DEPLOY_URL }} "php www/htdocs/artisan up"
